name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / OpenAI ${{ matrix.openai-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        openai-version: ["2.29.0", "2.43.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Pin OpenAI SDK under test
        run: python -m pip install "openai==${{ matrix.openai-version }}"

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: python -m build
